name: Build and deploy x-user-service
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github-x-sharedlib
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - uses: actions/checkout@v4
        with:
          repository: VathanaProgrammer/x-sharedlib
          path: x-sharedlib
      - run: mvn --batch-mode --no-transfer-progress -DskipTests install -f x-sharedlib/pom.xml
      - run: mvn --batch-mode --no-transfer-progress -DskipTests package
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/vathanaprogrammer/x-user-service:main
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.K3S_DEPLOY_HOST }}
          username: ${{ secrets.K3S_DEPLOY_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            sudo k3s kubectl -n x-platform create deployment x-user-service --image=ghcr.io/vathanaprogrammer/x-user-service:main --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            sudo k3s kubectl -n x-platform expose deployment x-user-service --port=8080 --target-port=8080 --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            sudo k3s kubectl -n x-platform set env deployment/x-user-service SERVER_PORT=8080 SPRING_PROFILES_ACTIVE=production SPRING_DATASOURCE_URL=jdbc:mysql://mysql.x-platform.svc.cluster.local:3306/x_prod SPRING_JPA_HIBERNATE_DDL_AUTO=update --from=secret/x-app-database
            sudo k3s kubectl -n x-platform rollout status deployment/x-user-service --timeout=180s
