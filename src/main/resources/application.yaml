server:
  port: ${USER_SERVICE_PORT:7445}

spring:
  banner:
    location: classpath:banner.txt
    mode: console
  application:
    name: x-user-service
  profiles:
    # local-seed creates admin / Admin@123456 on empty DB
    default: local,local-seed

# Used only when Spring profile "local-seed" is active.
x:
  http:
    logging:
      enabled: true
      server: x-user-service
      hop: "x-api-gateway → x-bff → x-user-service"
      hops:
        /internal/users: "x-api-gateway → x-bff → x-user-service"
        /api/v1/users: "x-api-gateway → x-bff → x-user-service"
  seed:
    admin-username: ${X_SEED_ADMIN_USERNAME:admin}
    admin-password: ${X_SEED_ADMIN_PASSWORD:Admin@123456}
    admin-full-name: ${X_SEED_ADMIN_FULL_NAME:System Administrator}
    admin-email: ${X_SEED_ADMIN_EMAIL:admin@x.local}
